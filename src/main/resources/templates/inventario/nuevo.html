<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nuevo producto')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">
                <h1 class="h4 mb-3">Registrar nuevo producto</h1>
                <p class="text-muted small">El producto se crea con cantidad inicial 0 y estatus activo.</p>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/admin/productos}" th:object="${productoForm}" method="post">
                            <div class="mb-3">
                                <label for="nombre" class="form-label">Nombre</label>
                                <input type="text" id="nombre" th:field="*{nombre}"
                                       class="form-control" th:errorclass="is-invalid" required>
                                <div class="invalid-feedback" th:errors="*{nombre}">Error</div>
                            </div>
                            <div class="mb-3">
                                <label for="descripcion" class="form-label">Descripción <span class="text-muted">(opcional)</span></label>
                                <textarea id="descripcion" th:field="*{descripcion}"
                                          class="form-control" rows="2" th:errorclass="is-invalid"></textarea>
                                <div class="invalid-feedback" th:errors="*{descripcion}">Error</div>
                            </div>
                            <div class="d-flex justify-content-end gap-2">
                                <a th:href="@{/inventario}" class="btn btn-outline-secondary">Cancelar</a>
                                <button type="submit" class="btn btn-primary">Guardar</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
