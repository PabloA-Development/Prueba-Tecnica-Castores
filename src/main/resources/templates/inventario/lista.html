<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Inventario')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<main class="flex-grow-1">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h1 class="h4 mb-0">Inventario de productos</h1>
            <div sec:authorize="hasRole('ADMINISTRADOR')" class="d-flex gap-2">
                <a th:href="@{/admin/productos/entrada}" class="btn btn-outline-primary btn-sm">Entrada de existencias</a>
                <a th:href="@{/admin/productos/nuevo}" class="btn btn-primary btn-sm">Nuevo producto</a>
            </div>
        </div>

        <div th:if="${exito}" class="alert alert-success alert-dismissible fade show py-2" role="alert">
            <span th:text="${exito}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-striped table-hover mb-0 align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th class="text-end">Cantidad</th>
                        <th class="text-center">Estatus</th>
                        <th sec:authorize="hasRole('ADMINISTRADOR')" class="text-end">Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${productos}">
                        <td th:text="${p.idProducto}">1</td>
                        <td th:text="${p.nombre}">Producto</td>
                        <td th:text="${p.descripcion}">—</td>
                        <td class="text-end" th:text="${p.cantidad}">0</td>
                        <td class="text-center">
                            <span th:if="${p.estatus}" class="badge text-bg-success">Activo</span>
                            <span th:unless="${p.estatus}" class="badge text-bg-secondary">Inactivo</span>
                        </td>
                        <td sec:authorize="hasRole('ADMINISTRADOR')" class="text-end">
                            <form th:if="${p.estatus}" th:action="@{/admin/productos/{id}/baja(id=${p.idProducto})}"
                                  method="post" class="d-inline"
                                  onsubmit="return confirm('¿Dar de baja este producto?');">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Baja</button>
                            </form>
                            <form th:unless="${p.estatus}" th:action="@{/admin/productos/{id}/reactivar(id=${p.idProducto})}"
                                  method="post" class="d-inline">
                                <button type="submit" class="btn btn-outline-success btn-sm">Reactivar</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${productos.isEmpty()}">
                        <td colspan="6" class="text-center text-muted py-4">No hay productos registrados.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/scripts :: scripts}"></th:block>
</body>
</html>
