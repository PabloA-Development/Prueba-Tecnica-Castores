<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Iniciar sesión')}"></head>
<body class="d-flex flex-column min-vh-100">
<main class="flex-grow-1">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h4 mb-1 text-center">📦 Inventario Castores</h1>
                        <p class="text-muted text-center mb-4">Inicia sesión para continuar</p>

                        <div th:if="${param.error}" class="alert alert-danger py-2" role="alert">
                            Correo o contraseña incorrectos.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success py-2" role="alert">
                            Tu sesión se cerró correctamente.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Correo</label>
                                <input type="email" id="username" name="username"
                                       class="form-control" required autofocus
                                       placeholder="correo@castores.local">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" id="password" name="password"
                                       class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Entrar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
