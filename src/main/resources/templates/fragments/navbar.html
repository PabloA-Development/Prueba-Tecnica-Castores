<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/inventario}">Inventario Castores</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navMenu" aria-controls="navMenu"
                aria-expanded="false" aria-label="Menú">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/inventario}">Inventario</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMINISTRADOR')">
                    <a class="nav-link" th:href="@{/movimientos}">Movimientos</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ALMACENISTA')">
                    <a class="nav-link" th:href="@{/salidas}">Salida de productos</a>
                </li>
            </ul>
            <div class="d-flex align-items-center">
                <span class="navbar-text text-white-50 me-3 small">
                    <span sec:authentication="name">usuario</span>
                </span>
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
                </form>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
